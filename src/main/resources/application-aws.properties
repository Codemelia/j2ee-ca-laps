# ============================================================
#  LAPS Application.Properties (EC2/RDS Instance)
#  Spring Boot 3.4.x | Spring 6.x | Java 17 LTS
# ============================================================

# Embedded MySQL Database
spring.datasource.url=jdbc:mysql://${MYSQL_HOSTNAME}:3306/lapsdb?serverTimezone=Asia/Singapore
spring.datasource.username=${MYSQL_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD}

# JPA / Hibernate
# none = rely entirely on schema.sql for DDL
spring.jpa.hibernate.ddl-auto=update

