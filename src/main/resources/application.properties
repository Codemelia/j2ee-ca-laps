# ============================================================
#  LAPS application.properties
#  Spring Boot 3.4.x | Spring 6.x | Java 17 LTS
# ============================================================

# Application
spring.application.name=laps

# Embedded MySQL Database
spring.datasource.url=${MYSQL_URL}/lapsdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# none = rely entirely on schema.sql for DDL
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Defer JPA datasource init so schema.sql + data.sql run AFTER
# the EntityManagerFactory is set up (required in Spring Boot 3.x)
spring.jpa.defer-datasource-initialization=true

# SQL Initialisation
# always = run schema.sql and data.sql on every startup
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8

# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML
# Disable cache in development
spring.thymeleaf.cache=false

# Server
server.port=8080
server.servlet.context-path=/

# Logging
logging.level.sg.edu.choppee=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG