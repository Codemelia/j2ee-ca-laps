# ============================================================
#  LAPS application.properties
#  Spring Boot 3.4.x | Spring 6.x | Java 17 LTS
# ============================================================

# Application
spring.application.name=G3LAPS
app.base.url=http://localhost:8080
app.email.domain=iss.nus.edu.sg

# Embedded MySQL Database
spring.profiles.active=railway
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# none = rely entirely on schema.sql for DDL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Defer JPA datasource init so schema.sql + data.sql run AFTER
# the EntityManagerFactory is set up (required in Spring Boot 3.x)
spring.jpa.defer-datasource-initialization=true

# SQL Initialisation
# always = run schema.sql and data.sql on every startup
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8

# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML
# Disable cache in development
spring.thymeleaf.cache=false

# Server
server.port=8080
server.servlet.context-path=/

# Logging
logging.level.sg.edu.nus.laps=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# Session timeout (idle time before session expires)
server.servlet.session.timeout=30m

## multipart config
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=30MB
spring.servlet.multipart.file-size-threshold=1MB

# s3 config
aws.region=us-east-1
aws.s3.bucket=leave-proof-demo-bucket
aws.access-key=${AWS_ACCESS_KEY_ID}
aws.secret-key=${AWS_SECRET_ACCESS_KEY}
aws.session-token=${AWS_SESSION_TOKEN}