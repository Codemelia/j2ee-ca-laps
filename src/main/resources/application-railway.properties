# ============================================================
#  LAPS Application.Properties (Railway Instance)
#  Spring Boot 3.4.x | Spring 6.x | Java 17 LTS
# ============================================================

# Embedded MySQL Database
spring.datasource.url=jdbc:mysql://${MYSQL_URL}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&connectionTimeZone=%2B08:00&forceConnectionTimeZoneToSession=true
spring.datasource.username=${MYSQL_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD}

# JPA / Hibernate
# none = rely entirely on schema.sql for DDL
spring.jpa.hibernate.ddl-auto=none
