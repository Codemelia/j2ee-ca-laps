<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">

	<head th:insert="~{fragments/head ::head('Claim History', ~{::extra})}">
		<th:block th:fragment="extra">
			<script th:inline="javascript">
				document.addEventListener('DOMContentLoaded', function () {
					const shouldShow = [[${showClaimFormModal}]];
					if (shouldShow === true) {
						const modalElem = document.getElementById('claimFormModal');
						if (modalElem) {
							const modal = new bootstrap.Modal(modalElem);
							modal.show();
						}
					}
				});
			</script>
		</th:block>
	</head>

	<body>
		<header th:replace="~{fragments/header :: header}"></header>
		<div class="container py-4">
			<a onclick="history.back()" class="text-decoration-none" style="cursor: pointer;">
				<i class="bi bi-arrow-left"></i> ← Back
			</a>
		</div>
        <div class="page-wrapper">
			<div class="container mt-4">
				<div class="d-flex justify-content-between align-items-start mb-4">
					<div>
						<h1 th:text="${empId != null ? (subordinateFullName ?: 'Member') + '''s Claim History' : 'My Claim History'}">Claim History</h1></div>
					<div th:if="${isSelf}">
						<button type="button" class="btn btn-primary" 
                            data-bs-toggle="modal" data-bs-target="#claimFormModal">
							Claim Overtime Compensation
						</button>
					</div>
				</div>
				<!-- Global error -->
				<div class="alert alert-error"
					th:if="${globalError}"
					th:text="${globalError}"></div>

				<!-- Success -->
				<div class="alert alert-success"
					th:if="${successMsg}"
					th:text="${successMsg}"></div>
	
				<!-- th:if checks whether the list is empty -->
		
				<p th:if="${#lists.isEmpty(teamClaims)} ">
					No claims found.
				</p>

				<table class="data-table table table-striped table-hover" 
					th:unless="${#lists.isEmpty(teamClaims)}">
					<thead>
						<tr>
							<th>Claim ID</th>
							<th>Worked Date</th>
							<th>Days</th>
							<th>Status</th>
                            <th>Submitted</th>
                            <th>Updated</th>
							<th>Actions</th>
						</tr>
					</thead>
					<tbody>
						<!-- th:each loops over the "leaveApplication" list from the Model -->
						<tr th:each="claim : ${teamClaims} ">
							<td th:text="${claim.id}">Claim ID</td>
							<td th:attr="data-order=${claim.workedDate}" th:text="${claim.workedDate != null ? #temporals.format(claim.workedDate, 'dd MMM yyyy') : 'N/A'}">DD MMM YYYY</td>
							<td th:text="${claim.claimedDays}">0.0</td>
							<td>
								<span class="badge rounded-pill"
                                    th:attr="data-status=${claim.status.name()}"
                                    th:classappend="${
                                        'APPLIED'.equals(claim.status.name()) ? 'bg-warning text-dark' :
                                        'APPROVED'.equals(claim.status.name()) ? 'bg-success' :
                                        'REJECTED'.equals(claim.status.name()) ? 'bg-danger' :
                                        'bg-primary'}"
                                    th:text="${claim.status.name()}">
                                </span>
							</td>
							<td th:attr="data-order=${claim.createdAt}" th:text="${claim.createdAt != null ? #temporals.format(claim.createdAt, 'dd MMM yyyy') : 'N/A'}">DD MMM YYYY</td>
							<td th:attr="data-order=${claim.updatedAt}" th:text="${claim.updatedAt != null ? #temporals.format(claim.updatedAt, 'dd MMM yyyy') : 'N/A'}">DD MMM YYYY</td>
							<td th:if="${isSelf}">
								<form
                                    th:if="${'APPLIED'.equals(claim.status.name())}"
                                    class="claim-action-form"
                                    th:action="@{/claims/delete}" method="post">
                                    <input type="hidden" name="id" th:value="${claim.id}">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button type="submit" class="btn btn-primary claim-action-btn">Delete</button>
                                </form>
                                <p></p>
                                <span th:unless="${'APPLIED'.equals(claim.status.name())}">
                                    Claim Processed
                                </span>
							</td>
                            <td th:unless="${isSelf}">
								<form
                                    class="claim-action-form"
                                    th:if="${'APPLIED'.equals(claim.status.name())}"
                                    th:action="@{/manager/team-claims/approve}" method="post">
                                    <input type="hidden" name="id" th:value="${claim.id}">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button type="submit" class="btn btn-primary claim-action-btn">Approve</button>
                                </form>
                                <p></p>
                                <form
                                    class="claim-action-form"
                                    th:if="${'APPLIED'.equals(claim.status.name())}"
                                    th:action="@{/manager/team-claims/reject}" method="post">
                                    <input type="hidden" name="id" th:value="${claim.id}">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button type="submit" class="btn btn-danger claim-action-btn"
                                        onclick="return confirm('Reject this claim?')">Reject</button>
                                </form>
                                <span th:unless="${claim.status.name() == 'APPLIED'}">
                                    No Action Required
                                </span>
							</td>
						</tr>
					</tbody>
				</table>

				<div class="modal fade" id="claimFormModal" 
                    th:if="${isSelf}"
                    tabindex="-1" aria-labelledby="claimFormModalLabel" 
                    aria-hidden="true">
					<div class="modal-dialog modal-dialog-centered">
						<div class="modal-content">
							<div class="modal-header">
								<h5 class="modal-title" id="claimFormModalLabel">Submit Overtime Claim</h5>
								<button type="button" class="btn-close" 
                                    data-bs-dismiss="modal" aria-label="Close"></button>
							</div>
							<form th:action="@{/claims/submit}" th:object="${claim}" method="post">
								<div class="modal-body">
									<div class="mb-3">
										<label for="workedDate" class="form-label">
                                            Worked Date <span class="required-star">*</span>
                                        </label>
										<input id="workedDate" type="date" 
                                            class="form-control" th:field="*{workedDate}" required>
										<div class="error" 
                                            th:if="${#fields.hasErrors('workedDate')}" 
                                            th:errors="*{workedDate}"></div>
									</div>

									<div class="mb-3">
										<label for="claimedDays" class="form-label">
                                            Days to Claim <span class="required-star">*</span>
                                        </label>

                                        <!-- Restrict to .5 steps -->
										<input id="claimedDays" type="number" 
                                            class="form-control" th:field="*{claimedDays}" min="0" step="0.5" required>
										<div class="error" 
                                            th:if="${#fields.hasErrors('claimedDays')}" 
                                            th:errors="*{claimedDays}"></div>
									</div>

									<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
								</div>
								<div class="modal-footer">
									<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
									<button type="submit" class="btn btn-primary">Submit</button>
								</div>
							</form>
						</div>
					</div>
				</div>
			</div>	
		</div>

        <footer th:replace="~{fragments/footer :: footer}"></footer>

		<div th:replace="~{fragments/modal :: changePasswordModal}"></div>

	</body>

</html>
