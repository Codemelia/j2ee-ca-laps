<!-- Movement Register: displays employee leave applications by month with pagination -->

<h2>Movement Register</h2>

<form method="get" action="/movement-register">
    Month:
    <input type="number" name="month" th:value="${month}" min="1" max="12"/>

    Year:
    <input type="number" name="year" th:value="${year}"/>

    <button type="submit">Go</button>
</form>

<br>

<table border="1">
    <tr>
        <th>Employee</th>
        <th>Leave Type</th>
        <th>Start Date</th>
        <th>End Date</th>
    </tr>

    <tr th:each="r : ${records.content}">
        <td th:text="${r.employee.name}"></td>
        <td th:text="${r.leaveType.name}"></td>
        <td th:text="${r.startDate}"></td>
        <td th:text="${r.endDate}"></td>
    </tr>
</table>

<br>

<!-- Pagination -->
<div>
    <a th:if="${records.hasPrevious()}"
       th:href="@{/movement-register(page=${records.number - 1}, month=${month}, year=${year})}">
        Previous
    </a>

    <span>Page [[${records.number + 1}]]</span>

    <a th:if="${records.hasNext()}"
       th:href="@{/movement-register(page=${records.number + 1}, month=${month}, year=${year})}">
        Next
    </a>
</div>
