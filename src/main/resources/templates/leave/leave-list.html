<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">

	<head th:insert="~{fragments/head ::head('Leave History', ~{::extra})}">
	</head>

	<body>
		<header th:replace="~{fragments/header :: header}"></header>
		<div class="container py-4">
			<a onclick="history.back()" class="text-decoration-none" style="cursor: pointer;">
				<i class="bi bi-arrow-left"></i> ← Back
			</a>
		</div>
        <div class="page-wrapper">
			<div class="container mt-4">
				<div class="d-flex justify-content-between align-items-start mb-4">
					<div>
						<h1 th:text="${empId != null ? (subordinateFullName ?: 'Member') + '''s Leave History' : 'My Leave History'}">Leave History</h1></div>
					<div>
						<a th:href="@{/leaves/apply}" class="btn btn-primary">
							Apply Leave
						</a>
					</div>
				</div>
				<!-- Global error -->
				<div class="alert alert-error"
					th:if="${globalError}"
					th:text="${globalError}"></div>

				<!-- Success -->
				<div class="alert alert-success"
					th:if="${successMsg}"
					th:text="${successMsg}"></div>
	
				<!-- th:if checks whether the list is empty -->
		
				<p th:if="${#lists.isEmpty(leaveList)} ">
					You have not applied for any leave yet.
				</p>

				<table class="data-table table table-striped table-hover" 
					th:unless="${#lists.isEmpty(leaveList)}">
					<thead>
						<tr>
							<th>Leave Type</th>
							<th>Start Date</th>
							<th>End Date</th>
							<th>Days</th>
							<th>Status</th>
							<th>Applied</th>
							<th>Updated</th>
							<th>Actions</th>
						</tr>
					</thead>
					
					
					<tbody>
						<!-- th:each loops over the "leaveApplication" list from the Model -->
						<tr th:each="leave : ${leaveList} ">
						
							<td th:text="${leave.leaveType?.leaveType}">Annual</td>
							<td th:attr="data-order=${leave.fromDate}" th:text="${leave.fromDate != null ? #temporals.format(leave.fromDate, 'dd MMM yyyy') : 'N/A'}">01 Jan 2026</td>
							<td th:attr="data-order=${leave.toDate}" th:text="${leave.toDate != null ? #temporals.format(leave.toDate, 'dd MMM yyyy') : 'N/A'}">02 Jan 2026</td>
							<td th:text="${leave.duration}">0.0</td>
							<td>
								<span class="badge rounded-pill"
                                    th:attr="data-status=${leave.status.name()}"
                                    th:classappend="${
                                        'APPLIED'.equals(leave.status.name()) ? 'bg-warning text-dark' :
                                        'UPDATED'.equals(leave.status.name()) ? 'bg-info text-dark' :
                                        'APPROVED'.equals(leave.status.name()) ? 'bg-success' :
                                        'REJECTED'.equals(leave.status.name()) ? 'bg-danger' :
                                        ('CANCELLED'.equals(leave.status.name()) or 'DELETED'.equals(leave.status.name())) ? 'bg-secondary' :
                                        'bg-primary'}"
                                    th:text="${leave.status.name()}">
                                </span>
							</td>
							<td th:attr="data-order=${leave.createdAt}" th:text="${leave.createdAt != null ? #temporals.format(leave.createdAt, 'dd MMM yyyy') : 'N/A'}">02 Jan 2026</td>
							<td th:attr="data-order=${leave.updatedAt}" th:text="${leave.updatedAt != null ? #temporals.format(leave.updatedAt, 'dd MMM yyyy') : 'N/A'}">02 Jan 2026</td>
							<td>
							<!--Link to detail page, based on referer -->
								<a th:if="${!isSelf}" 
									th:href="@{/manager/team-leaves/details/{id}(id=${leave.id})}" 
									class="btn btn-secondary btn-sm">View</a>
								<a th:if="${isSelf}" 
									th:href="@{/leaves/details/{id}(id=${leave.id})}" 
									class="btn btn-secondary btn-sm">View</a>
							</td>
							</td>
						</tr>
					</tbody>
				</table>
			</div>	
		</div>

        <footer th:replace="~{fragments/footer :: footer}"></footer>

		<div th:replace="~{fragments/modal :: changePasswordModal}"></div>

	</body>

</html>
