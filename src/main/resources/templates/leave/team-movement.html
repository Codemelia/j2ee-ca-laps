<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">

	<head th:insert="~{fragments/head ::head('Leave History', ~{::extra})}">
	</head>

	<body>
		<header th:replace="~{fragments/header :: header}"></header>
		<div class="container py-4">
			<a onclick="history.back()" class="text-decoration-none" style="cursor: pointer;">
				<i class="bi bi-arrow-left"></i> ← Back
			</a>
		</div>
        <div class="page-wrapper">
			<div class="container mt-4">
				<h1 th:text="${!#lists.isEmpty(leaveList)} ? 'Team Movement: ' + ${leaveList[0].employee.teamName} : 'Team Movement'">Team Movement</h1>
				<form th:action="@{/leaves/team-movement}" method="get" class="d-flex align-items-center">
				    <label for="monthSelect" class="me-2 fw-bold">Period:</label>
				    <select name="month" id="monthSelect" class="form-select form-select-sm w-auto" onchange="this.form.submit()">
				        <option th:each="m : ${#numbers.sequence(1, 12)}"
				                th:value="${m}"
				                th:selected="${m == currentMonth}"
				                th:text="${T(java.time.Month).of(m).name() + ' ' + displayYear}">
				        </option>
				    </select>
				</form>
				<!-- Global error -->
				<div class="alert alert-error"
					th:if="${globalError}"
					th:text="${globalError}"></div>

				<!-- Success -->
				<div class="alert alert-success"
					th:if="${successMsg}"
					th:text="${successMsg}"></div>
	
				<!-- th:if checks whether the list is empty -->
		
				<p th:if="${#lists.isEmpty(leaveList)} ">
					No leave record to view
				</p>

				<table class="data-table table table-striped table-hover" 
					th:unless="${#lists.isEmpty(leaveList)}">
					<thead>
					    <tr>
					        <th>Start Date</th>
					        <th>End Date</th>
							<th>Staff Name</th> 
							<th>Leave Type</th>					        
					        <th>Status</th>
					    </tr>
					</thead>
					
					
					<tbody>
					    <tr th:each="leave : ${leaveList}">
							<td th:text="${#temporals.format(leave.fromDate, 'dd MMM yyyy')}">01 Jan 2026</td>
												        <td th:text="${#temporals.format(leave.toDate, 'dd MMM yyyy')}">02 Jan 2026</td>
					        <td th:text="${leave.employee.firstName + ' ' + leave.employee.lastName}">Amy</td>
					        					        <td th:text="${leave.leaveType?.leaveType}">Annual</td>				        
					        
					        
					        <td>
					            <span class="badge rounded-pill"
					                th:classappend="${
					                    'APPROVED'.equals(leave.status.name()) ? 'bg-success' : 'bg-warning text-dark'}"
					                th:text="${leave.status.name()}">
					            </span>
					        </td>
					    </tr>
					</tbody>
				</table>
			</div>	
		</div>

        <footer th:replace="~{fragments/footer :: footer}"></footer>

		<div th:replace="~{fragments/modal :: changePasswordModal}"></div>

	</body>

</html>
