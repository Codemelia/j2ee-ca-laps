<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">

	<head th:replace="~{fragments/head ::head('My Leave History', ~{::extra})}">
    <!-- For scripts -->
		<th:block th:fragment="extra">
			<style>
						label {
							display: inline-block;
							width: 150px; /* Specify your desired width here */
							margin-right: 10px;
							margin-bottom: 10px;
						}
						input {
							width: 200px;
						}
					</style>
			        <!-- For scripts -->
					<script th:src="@{/js/main.js}" defer></script>
		</th:block>
  </head>

	<body>
		<header th:replace="~{fragments/header :: header}"></header>
    
    <div class="page-wrapper">
      <h2 class="page-heading">Leave Application Form</h2>
      <div class="card">
        <form
          th:action="@{/leaves/apply}"th:object="${leaveApplication}"
          method="post">
          <div class="form-group">
            <label for="leaveType">Leave Type</label>
            <select id="leaveType"th:field="*{leaveType.id}" class="form-control"required>
              <option value="" disabled selected>Select Type</option>
              <option  th:each="lt : ${leaveTypes}" 
			           th:value="${lt.id}" 
			           th:text="${lt.leaveType}">Annual</option>
              
            </select>
          </div>
          <div class="form-group">
            <label>From</label>
            <input type="date"  th:field="*{fromDate}" required />
			<span class="error" th:if="${#fields.hasErrors('fromDate')}"
										th:errors="*{fromDate}"></span>
          </div>
          <div class="form-group">
            <label>To</label>
            <input type="date"  th:field="*{toDate}" required />
            <span class="field-error" th:if="${dateError}"
              >You have an existing Leave within this date range</span>
          </div>
          <div class="form-group">
            <label>Proof</label>
            <input type="file"  th:field="*{proof}" />
            <p class="sub-text">Upload image to S3</p>
          </div>
          <div class="form-group">
            <label>Reason</label>
            <textarea
              th:field="*{reason}" placeholder="State your reason"
            ></textarea>
          </div>

          <input type="hidden" th:name="${_csrf.parameterName}"
            th:value="${_csrf.token}">
          <div class="nav-links">
            <button
              type="submit"
              name="action"
              value="save"
              class="btn btn-secondary"
            >
              SAVE
            </button>
            <button
              type="submit"
              name="action"
              value="submit"
              class="btn btn-primary"
            >
              SUBMIT
            </button>
          </div>
        </form>
      </div>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>

		<div th:replace="~{fragments/modal :: changePasswordModal}"></div>

  </body>
</html>
