<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">

	<head th:replace="~{fragments/head ::head('Leave Application Form', ~{::extra})}">
    <!-- For scripts -->
		<th:block th:fragment="extra">
			<style>
						label {
							display: inline-block;
							width: 150px; /* Specify your desired width here */
							margin-right: 10px;
							margin-bottom: 10px;
						}
						input {
							width: 200px;
						}
					</style>
			        <!-- For scripts -->
		</th:block>
  </head>

	<body>
		<header th:replace="~{fragments/header :: header}"></header>
    
    <div class="page-wrapper">
      <div class="card">
      <h2 class="page-heading">Leave Application Form</h2>
      <!-- Global error -->
      <div class="alert alert-error"
          th:if="${globalError}"
          th:text="${globalError}"></div>
          <!-- If ID exist, save draft; Else submit -->
        <form 
          th:action="@{/leaves/save}"
          th:object="${leaveApp}"
          method="post">
          <div class="form-group">
            <label for="leaveType">Leave Type</label>
            <select id="leaveType"
			        th:field="*{leaveTypeId}" 
					    class="form-control"
              th:disabled="${leaveApp != null and leaveApp.id != null}"
					    required>
              <option value="" disabled selected>Select Type</option>
              <option th:each="leaveType : ${leaveTypes}" 
                th:value="${leaveType.id}" 
                th:text="${leaveType.leaveType}">Annual</option>
            </select>
            <span class="error" th:if="${#fields.hasErrors('leaveTypeId')}"
              th:errors="*{leaveTypeId}"></span>
          </div>
          <div class="form-group">
            <label>From</label>
            <input type="date"  th:field="*{fromDate}" required />
            <span class="error" th:if="${#fields.hasErrors('fromDate')}"
              th:errors="*{fromDate}"></span>
          </div>
          <div class="form-group">
            <label>To</label>
            <input type="date"  th:field="*{toDate}" required />
            <span class="field-error" th:if="${dateError}">
              You have an existing Leave within this date range</span>
            <span class="error" th:if="${#fields.hasErrors('toDate')}"
              th:errors="*{toDate}"></span>
          </div>
          <div class="form-group">
            <label>Proof</label>
            <input type="file"  th:field="*{proof}" />
            <p class="sub-text">Upload image to S3</p>
          </div>
          <div class="form-group">
            <label>Reason</label>
            <textarea
              th:field="*{reason}" placeholder="State your reason">
            </textarea>
            <span class="error" th:if="${#fields.hasErrors('reason')}"
                th:errors="*{reason}"></span>
          </div>
		  <!-- add ymw -->	  
		        <div class="form-group">
		  		    <label>Work Dissemination</label>
		  		    <textarea th:field="*{workDissemination}"
                placeholder="Describe work handover details"></textarea>
              <span class="error" th:if="${#fields.hasErrors('workDissemination')}"
                th:errors="*{workDissemination}"></span>
		  		  </div>
		  		  <div class="form-group">
		  		    <label>Contact Details</label>
		  		    <input type="text" th:field="*{contactDetails}"
                placeholder="Phone / Email / WhatsApp" />
              <span class="error" th:if="${#fields.hasErrors('contactDetails')}"
                th:errors="*{contactDetails}"></span>
		  		  </div>

          <!-- Hidden ID for update -->
          <div th:if="${leaveApp != null and leaveApp.id != null}">
              <input type="hidden" th:field="*{id}">
          </div>
          <input type="hidden" th:name="${_csrf.parameterName}"
            th:value="${_csrf.token}">
          <input type="hidden" name="viewName" value="leave/leave-form">
          <div class="nav-links">
            <div th:if="${leaveApp == null or leaveApp.id == null 
              || leaveApp.status.name() == 'DRAFT'}">
              <button type="submit" class="btn btn-secondary" 
                th:formaction="@{/leaves/save}">
                Save
              </button>
              <button type="submit" class="btn btn-primary" 
                th:formaction="@{/leaves/submit}">
                Submit
              </button>
            </div>
            <div th:if="${leaveApp != null and leaveApp.id != null 
              && (leaveApp.status.name() == 'APPLIED'
              || leaveApp.status.name() == 'UPDATED')}">
              <button type="submit" class="btn btn-secondary" 
                th:formaction="@{/leaves/update}">
                Update
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>

		<div th:replace="~{fragments/modal :: changePasswordModal}"></div>

  </body>
</html>
