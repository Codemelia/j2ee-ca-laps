<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">

	<head th:replace="~{fragments/head ::head('Employee Management', ~{::extra})}"></head>

	<!-- For scripts - DELETE if unused -->
	<th:block th:fragment="extra"></th:block>

	<body>
		<header th:replace="~{fragments/header :: header}"></header>
		
        <div class="page-wrapper">
            <!-- Display success or failure messages -->
			<div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
			<div th:if="${failure}" class="alert alert-danger" th:text="${failure}"></div>
			<div>
				<a href="/admin/employees/create">
					<button type="button">Add New Employee</button>
				</a>
			</div>
			<h1>Employee Management</h1>
			
			<div >
				<p>Welcome, <span th:text="${userFirstName}">User</span>!</p>
			</div>	
			
			<!-- Employees table -->
			<!-- All employees table only displays when user role is ADMIN -->
			<div>	
				<p><h2>All Employees</h2></p>
				<table border="1" cellpadding="6" cellspacing="0" th:unless="${allEmployees.isEmpty()}">
					<thead>
						<tr>
							<th>ID</th><th>First Name</th><th>Last Name</th>
							<th>Email</th><th>Contact Number</th><th>Rank</th>
							<th>User Role</th>
							<th>Manager's ID</th>
							<!-- <th>Created At</th><th>Updated At</th> -->
							<th>Update</th>
							<th>Delete</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="e : ${allEmployees}">
							<td th:text="${e.id}">Employee Id</td>
							<td th:text="${e.firstName}">First Name</td>
							<td th:text="${e.lastName}">Last Name</td>
							<td th:text="${e.user.email}">Email</td>
							<td th:text="${e.contactNumber}">Contact Number</td>
							<td th:text="${e.rank}">Rank</td>
							<td th:text="${e.user.role.name}">User Role</td>
							<td th:text="${e.managerId}">Manager's ID</td>
							<!-- <td th:text="${#temporals.format(e.createdAt,'dd MMM yyyy')}">Created At</td>
							<td th:text="${#temporals.format(e.updatedAt,'dd MMM yyyy')}">Updated At</td> -->
							<td><a th:href="@{/admin/employees/update/{id}(id=${e.id})}">Update Details</a></td>
							<td><a th:href="@{/admin/employees/delete/{id}(id=${e.id})}">Delete Employee</a></td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>

        <footer th:replace="~{fragments/footer :: footer}"></footer>
	</body>

</html>
