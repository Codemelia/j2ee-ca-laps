<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">

	<head th:replace="~{fragments/head ::head('Create Employee', ~{::extra})}"></head>

	<th:block th:fragment="extra">
		<style>
			label {
				display: inline-block;
				width: 150px; /* Specify your desired width here */
				margin-right: 10px;
				margin-bottom: 10px;
			}
			input {
				width: 200px;
			}
		</style>
	</th:block>

	<body>
		<header th:replace="~{fragments/header :: header}"></header>
		
        <div class="page-wrapper">
            <h1>Create New Employee</h1>
	
			<div th:if="${employee}">
				
				<form th:action="@{/admin/employees/create}" th:object="${employee}" method="post">
					<div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger"
					th:errors="*{error}">
					</div>
					
					<div>
						<label for="firstName">First Name:</label>
						<input type="text" th:field="*{firstName}" placeholder="First name"><br> 
						<span class="error" th:if="${#fields.hasErrors('firstName')}"
							th:errors="*{first_name}"></span>
					</div>
					
					<div>	
						<label for="lastName">Last Name:</label>
						<input type="text" th:field="*{lastName}" placeholder="Last name"><br>
						<span class="error" th:if="${#fields.hasErrors('lastName')}"
							th:errors="*{lastName}"></span>
					</div>
					
					<div>	
						<label for="contactNumber">Contact number:</label> 
						<input type="text" th:field="*{contactNumber}"><br>
						<span class="error" th:if="${#fields.hasErrors('contactNumber')}"
							th:errors="*{contactNumber}"></span>
					</div>

					<div>
						<label for="roleName">Employee's User Role:</label>
						<select th:field="*{roleName}">
							<option value="" disabled>-- Select User Role --</option>
							<option th:each="role : ${roleList}"
									th:value="${role.name}"
									th:text="${role.name}">
							</option>
						</select>
						<span class="error" th:if="${#fields.hasErrors('roleName')}"
							th:errors="*{roleName}"></span>
					</div>
					
					<div>	
						<label for="rank">Employee's Rank:</label>
						<select th:field="*{rank}">
							<option value="" th:selected="${employee.rank == null}">-- Select Employee's Rank --</option>
							<option th:each="r : ${rankList}"
									th:value="${r}"
									th:text="${r.displayName}"
									th:selected="${employee.rank == r}">
							</option>
						</select><br>
						<span class="error" th:if="${#fields.hasErrors('rank')}"
							th:errors="*{rank}"></span>
					</div>	
						
					<div>	
						<label for="managerId">Manager's ID:</label>
						<input type="text" th:field="*{managerId}"><br>
						<span class="error" th:if="${#fields.hasErrors('managerId')}"
							th:errors="*{managerId}"></span>
					</div>
					
					<div>	
						<label for="teamName">Team Name:</label>
						<input type="text" th:field="*{teamName}"><br>
						<span class="error" th:if="${#fields.hasErrors('teamName')}"
							th:errors="*{teamName}"></span>
					</div>
					
					<div>	
						<label for="jobTitle">Job Title:</label>
						<input type="text" th:field="*{jobTitle}"><br>
						<span class="error" th:if="${#fields.hasErrors('jobTitle')}"
							th:errors="*{jobTitle}"></span>
					</div>
					
					<button type="button" th:onclick="history.back()}">Back</button>
					<button type="submit">Create Employee</button>
				</form>
			</div>

			<div th:unless="${employee}">
				Employee does not exist.
			</div>
		</div>

        <footer th:replace="~{fragments/footer :: footer}"></footer>
	</body>

</html>
