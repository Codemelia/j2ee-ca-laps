<header th:fragment="header">
    <div class="topbar">

        <!-- Logo -->
        <a th:href="@{/}" class="site-title" th:text="${appName} ?: 'G3LAPS'"></a>

        <!-- Spring Security user role auth -->
        <!-- Only if is not login page -->
        <div th:if="${entryPoint == null}">
            <!-- Nav links -->
            <nav class="nav-links">

            <!-- ROLE_EMPLOYEE: Dashboard, My Leaves -->
            <th:block sec:authorize="hasRole('EMPLOYEE')">
                <a th:href="@{/me}">Dashboard</a>
                <a th:href="@{/leaves}">My Leave History</a>
            </th:block>

            <!-- ROLE_MANAGER: Dashboard, My Leaves, Team Leaves -->
            <th:block sec:authorize="hasRole('MANAGER')">
                <a th:href="@{/me}">Dashboard</a>
                <a th:href="@{/leaves}">My Leave History</a>
                <a th:href="@{/manager/leaves}">Subordinate Leave History</a>
            </th:block>

            <!-- INTERNAL ROLE_ADMIN: Dashboard, My Leaves, Employee Management -->
            <th:block sec:authorize="hasRole('ADMIN') and hasAuthority('AUTH_INTERNAL_ADMIN')">
                <a th:href="@{/me}">Dashboard</a>
                <a th:href="@{/leaves}">My Leave History</a>
                <a th:href="@{/admin/employees}">Employee Management</a>
            </th:block>

            <!-- EXTERNAL ROLE_ADMIN: Employee Management -->
            <th:block sec:authorize="hasRole('ADMIN') and hasAuthority('AUTH_EXTERNAL_ADMIN')">
                <a th:href="@{/admin/employees}">Employee Management</a>
            </th:block>
            </nav>
        </div>

        <!-- Logged in user and logout button -->
        <!-- Only if is not login page -->
        <div class="user-info" sec:authorize="isAuthenticated()"
            th:if="${entryPoint == null}">
            
            <table class="logout">
            	<tr >
	            <td style="padding: 15px;"><span>
	                <strong th:text="${employeeFullName} ?: 'Admin User'"></strong><br>
	                <strong th:text="${employeeTeam} ?: 'External'"></strong><br>
	                <strong th:text="${employeeTitle} ?: 'Administrator'"></strong>
	            </span>
	            </td>
	            <td style="padding: 15px;">
                <!-- Admin logout -->
                <form th:action="@{/auth/admin/logout}" method="POST"
                    sec:authorize="hasRole('ADMIN')">
	                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-primary btn-full">Logout</button>
                </form>

                <!-- Employee logout -->
                <form th:action="@{/auth/employee/logout}" method="POST"
                    sec:authorize="hasAnyRole('EMPLOYEE','MANAGER')">
	                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-primary btn-full">Logout</button>
                </form>
	            </td>
	            </tr>
            </table>
        </div>

    </div>
</header>
