<header th:fragment="header">
    <div class="topbar">

        <!-- Logo -->
        <a th:href="@{/}" class="site-title" 
            sec:authorize="!hasAuthority('AUTH_INTERNAL_ADMIN')"
            th:text="${appName} ?: 'G3LAPS'"></a>

        <a th:href="@{/admin/employees}" class="site-title" 
            sec:authorize="hasAuthority('AUTH_INTERNAL_ADMIN')"
            th:text="${appName} ?: 'G3LAPS'"></a>

        <!-- Spring Security user role auth -->
        <!-- Only if is not login page -->
        <div th:if="${entryPoint == null
            and status == null}">
            <!-- Topbar links -->
            <nav class="top-links">

                <!-- ROLE_EMPLOYEE: Dashboard, My Leaves -->
                <th:block sec:authorize="hasRole('EMPLOYEE')">
                    <a th:href="@{/me}">Dashboard</a>
                    <a th:href="@{/leaves}">My Leave History</a>
                </th:block>

                <!-- ROLE_MANAGER: Dashboard, My Leaves, Team Leaves -->
                <th:block sec:authorize="hasRole('MANAGER')">
                    <a th:href="@{/me}">Dashboard</a>
                    <a th:href="@{/leaves}">My Leave History</a>
                    <a th:href="@{/manager/leaves}">Team Leave History</a>
                </th:block>

                <!-- INTERNAL ROLE_ADMIN: Dashboard, My Leaves, Employee Management -->
                <th:block sec:authorize="hasRole('ADMIN') and hasAuthority('AUTH_INTERNAL_ADMIN')">
                    <a th:href="@{/me}">Dashboard</a>
                    <a th:href="@{/leaves}">My Leave History</a>
                    <a th:href="@{/admin/employees}">Employee Management</a>
                </th:block>

                <!-- EXTERNAL ROLE_ADMIN: Employee Management -->
                <th:block sec:authorize="hasRole('ADMIN') and hasAuthority('AUTH_EXTERNAL_ADMIN')">
                    <a th:href="@{/admin/employees}">Employee Management</a>
                </th:block>
            </nav>
        </div>

        <!-- Logged in user and logout button -->
        <!-- Only if is not login page -->
        <div class="user-info" sec:authorize="isAuthenticated()"
            th:if="${entryPoint == null}">
            <div class="emp-details">
                <p th:text="${employeeFullName} ?: 'Admin User'"></p>
                <p th:text="${employeeTeam} ?: 'External'"></p>
                <p th:text="${employeeTitle} ?: 'Administrator'"></p>
            </div>

            <!-- Dropdown menu for user actions -->
            <div class="user-menu">
                <button class="user-icon" onclick="toggleDropdown(event)">
                    <img th:src="@{/images/user.png}" alt="User">
                </button>
                <div id="dropdownMenu" class="dropdown">
                    <div class="dropdown-header">
                        <strong th:text="${#authentication.principal.email}
                            ?: 'Invalid User'">
                        </strong>
                    </div>

                    <hr>

                    <!-- User actions -->
                    <!-- Instead of form page, use modal-->
                    <a th:if="${#authentication.principal.email}" 
                        href="#" data-bs-toggle="modal"
                        data-bs-target="#changePasswordModal">Change Password</a>

                    <!-- Admin logout -->
                    <form th:action="@{/auth/admin/logout}" method="POST"
                        sec:authorize="hasRole('ADMIN')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="dropdown-link">Logout</button>
                    </form>

                    <!-- Employee logout -->
                    <form th:action="@{/auth/employee/logout}" method="POST"
                        sec:authorize="hasAnyRole('EMPLOYEE','MANAGER')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="dropdown-link">Logout</button>
                    </form>
                </div>
            </div>
        </div>

    </div>
</header>
