<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">

	<head th:replace="~{fragments/head ::head('Dashboard', ~{::extra})}"></head>

	<body>
		<header th:replace="~{fragments/header :: header}"></header>
	
		<div class="page-wrapper">
			
			<div class="container mt-4">
			    <div class="d-flex justify-content-between align-items-start mb-4">
			        
			        <div>
			            <h1>Welcome, <span th:if="${employeeFirstName}" th:text="${employeeFirstName} ?: 'Admin User'"></span>!</h1></div>
			        <div>
			            <a th:href="@{/leaves/apply}" class="btn btn-primary">
			                Apply Leave
			            </a>
			        </div>
			        
			    </div>

			    </div>	

		    <!-- Leave Balance Cards -->
		    <h2>My Leave Balance</h2>
		    <div class="cards-container">
		        <div class="card" th:each="rec : ${leaveRecords}">
		            <h3 th:text="${rec.leaveType.leaveType}">Leave Type</h3>
		            <p>Entitled: <span th:text="${rec.entitledDays}">0</span></p>
		            <p>Consumed: <span th:text="${rec.consumedDays}">0</span></p>
		            <p>Balance: 
		                <span th:text="${rec.entitledDays - rec.consumedDays}">
		                </span>
		            </p>
		        </div>
		        <!-- Fallback if no records -->
		        <p th:if="${#lists.isEmpty(leaveRecords)}">
		            No leave records found.
		        </p>
		    </div>

		    <!-- My Recent Leave Requests -->
		    <h2>My Latest Leave Applications</h2>
		    <table class="data-table">
		        <thead>
		            <tr>
		                <th>Leave Type</th>
		                <th>Start Date</th>
		                <th>End Date</th>
		                <th>Status</th>
						<th>Applied</th>
						<th>Updated</th>
		            </tr>
		        </thead>
		        <tbody>
		            <tr th:each="app : ${recentApplications}">
		                <td th:text="${app.leaveType.leaveType}">-</td>
		                <td th:text="${#temporals.format(app.fromDate, 'dd MMM yyyy')}">-</td>
		                <td th:text="${#temporals.format(app.toDate, 'dd MMM yyyy')}">-</td>
		                <td th:text="${app.status}">-</td>
						<td th:text="${app.createdAt != null ? #temporals.format(app.createdAt, 'dd MMM yyyy') : 'N/A'}">02 Jan 2026</td>
						<td th:text="${app.updatedAt != null ? #temporals.format(app.updatedAt, 'dd MMM yyyy') : 'N/A'}">02 Jan 2026</td>
		            </tr>
		            <tr th:if="${#lists.isEmpty(recentApplications)}">
		                <td colspan="6">No leave applications found.</td>
		            </tr>
		        </tbody>
		    </table>
		</div>

		<footer th:replace="~{fragments/footer :: footer}"></footer>

		<div th:replace="~{fragments/modal :: changePasswordModal}"></div>
	</body>

</html>
